{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Fournisseurs</h3>
  <a href="{% url 'supplier_create' %}" class="btn btn-success">+ Nouveau</a>
</div>
<table class="table table-striped">
  <thead><tr><th>Nom</th><th>Email</th><th>Téléphone</th><th></th></tr></thead>
  <tbody>
    {% for s in suppliers %}
    <tr>
      <td>{{ s.name }}</td><td>{{ s.email|default:"-" }}</td><td>{{ s.phone|default:"-" }}</td>
      <td><a href="#" class="btn btn-sm btn-primary">Modifier</a></td>
    </tr>
    {% empty %}
    <tr><td colspan="4">Aucun fournisseur.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
