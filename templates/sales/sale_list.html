{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Ventes</h3>
  <a href="{% url 'pos_screen' %}" class="btn btn-success">+ Nouvelle vente</a>
</div>
<table class="table table-striped">
  <thead><tr><th>N° Vente</th><th>Client</th><th>Date</th><th>Total TTC</th><th></th></tr></thead>
  <tbody>
    {% for s in sales %}
    <tr>
      <td>SALE #{{ s.id }}</td><td>{{ s.customer|default:"Client comptoir" }}</td><td>{{ s.date }}</td><td>{{ s.total_incl_tax }}€</td>
      <td><a href="#" class="btn btn-sm btn-info">Détails</a></td>
    </tr>
    {% empty %}
    <tr><td colspan="5">Aucune vente.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
