{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Achats</h3>
  <a href="{% url 'purchase_create' %}" class="btn btn-success">+ Nouvel achat</a>
</div>
<table class="table table-striped">
  <thead><tr><th>N° Commande</th><th>Fournisseur</th><th>Date</th><th>Facture</th><th></th></tr></thead>
  <tbody>
    {% for p in purchases %}
    <tr>
      <td>PO #{{ p.id }}</td><td>{{ p.supplier }}</td><td>{{ p.date }}</td><td>{{ p.invoice_no|default:"-" }}</td>
      <td><a href="#" class="btn btn-sm btn-info">Détails</a></td>
    </tr>
    {% empty %}
    <tr><td colspan="5">Aucun achat.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
